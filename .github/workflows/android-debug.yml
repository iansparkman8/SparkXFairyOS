name: Build SparkXFairyOS Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.9

    - name: Ensure Gradle wrapper (generate if missing or incomplete)
      run: |
        if [ ! -f "./gradlew" ] || [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "⚠️  Gradle wrapper incomplete or missing in repository. Generating full wrapper with Gradle 8.9 (bin dist)..."
          gradle wrapper --gradle-version 8.9 --distribution-type bin
          chmod +x gradlew gradlew.bat || true
          ls -la gradlew gradle/wrapper/ || true
        fi

    - name: Run preflight safety check
      run: |
        chmod +x scripts/preflight_check.sh || true
        ./scripts/preflight_check.sh || echo "Preflight warnings (non-blocking for v7)"

    - name: Assemble Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: SparkXFairyOS-v7-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
