name: Build SparkXFairyOS Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.9

    - name: Run preflight safety check (non-blocking)
      run: |
        if [ -f scripts/preflight_check.sh ]; then
          chmod +x scripts/preflight_check.sh || true
          ./scripts/preflight_check.sh || echo "Preflight warnings (non-blocking)"
        fi

    - name: Assemble Debug APK
      run: gradle assembleDebug --stacktrace

    - name: Upload Debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: SparkXFairyOS-v7-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
