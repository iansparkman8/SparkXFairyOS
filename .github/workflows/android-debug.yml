name: Build SparkXFairyOS Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Debug source snapshot
      run: |
        echo "=== Git commit ==="
        git rev-parse HEAD

        echo "=== MainActivity around line 390-430 ==="
        nl -ba app/src/main/java/com/sparkx/fairyos/MainActivity.kt | sed -n '390,430p' || true

        echo "=== Search currentScreen ==="
        grep -R "currentScreen" -n app/src/main/java/com/sparkx/fairyos || true

        echo "=== SparkBabyAvatar imports/top ==="
        nl -ba app/src/main/java/com/sparkx/fairyos/ui/components/SparkBabyAvatar.kt | sed -n '1,45p' || true

        echo "=== FairyIdentity ==="
        nl -ba app/src/main/java/com/sparkx/fairyos/FairyIdentity.kt | sed -n '1,80p' || true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.9

    - name: Run preflight safety check
      run: |
        chmod +x scripts/preflight_check.sh || true
        ./scripts/preflight_check.sh || echo "Preflight warnings (non-blocking for v7)"

    - name: Build debug APK
      run: gradle clean assembleDebug --stacktrace

    - name: Upload Debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: SparkXFairyOS-v7-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
